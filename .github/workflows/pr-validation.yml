name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Check PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Required sections for AI-authored PRs
            const requiredSections = [
              { name: 'Summary', pattern: /##\s*Summary/i },
              { name: 'Testing and Verification', pattern: /##\s*Testing\s+and\s+Verification/i },
              { name: 'Assumptions and Limitations', pattern: /##\s*Assumptions\s+and\s+Limitations/i },
              { name: 'Reproducibility', pattern: /##\s*Reproducibility/i },
              { name: 'AI Agent Pre-Merge Evidence', pattern: /##\s*AI\s+Agent\s+Pre-Merge\s+Evidence/i }
            ];

            // Check for AI authorship indicators
            const isAIAuthored = body.includes('Co-Authored-By: Claude') ||
                                pr.user.login.includes('bot') ||
                                body.includes('AI Agent Pre-Merge Evidence') ||
                                pr.head.ref.startsWith('agent/');

            console.log(`PR #${pr.number} by ${pr.user.login}, AI authored: ${isAIAuthored}`);

            if (!isAIAuthored) {
              console.log('Not an AI-authored PR, skipping enhanced validation');
              return;
            }

            const missingRequiredSections = requiredSections.filter(
              section => !section.pattern.test(body)
            ).map(section => section.name);

            // Check for essential checkboxes
            const hasTestingCheckbox = /- \[[ x]\].*pytest/i.test(body) ||
                                      /- \[[ x]\].*not run/i.test(body);
            const hasVerificationCheckbox = /- \[[ x]\].*verify.*suite/i.test(body);
            const hasQualityCheckbox = /- \[[ x]\].*ruff check/i.test(body);

            let issues = [];

            if (missingRequiredSections.length > 0) {
              issues.push(`Missing required sections: ${missingRequiredSections.join(', ')}`);
            }

            if (!hasTestingCheckbox) {
              issues.push('Missing testing checkbox (pytest or "not run" explanation required)');
            }

            if (!hasVerificationCheckbox) {
              issues.push('Missing verification suite checkbox (quick or full suite required)');
            }

            if (!hasQualityCheckbox) {
              issues.push('Missing code quality checkbox (ruff check required)');
            }

            if (issues.length > 0) {
              const errorMsg = `🤖 **AI-authored PR validation failed:**\n\n${issues.map(issue => `- ${issue}`).join('\n')}\n\nPlease update the PR description to include all required sections and checkboxes as specified in the PR template. See AGENTS.md for detailed requirements.`;

              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: errorMsg
              });

              core.setFailed('PR validation failed - missing required template sections');
            } else {
              console.log('✅ PR validation passed - all required sections present');

              // Post success comment if this is a new PR
              if (context.payload.action === 'opened') {
                await github.rest.issues.createComment({
                  issue_number: pr.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '✅ **AI-authored PR validation passed** - All required template sections are present. Remember to complete all verification steps before merging.'
                });
              }
            }

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
      - name: Run ruff check
        run: |
          ruff check . --output-format=github
      - name: Check for TODO/FIXME without justification
        run: |
          # Allow TODO/FIXME in comments if followed by explanation/issue reference
          if find . -name "*.py" -not -path "./.venv/*" -not -path "./venv*/*" -not -path "./build/*" -exec grep -l "TODO\|FIXME" {} \; | xargs grep -n "TODO\|FIXME" | grep -v -E "(TODO:.*#[0-9]+|FIXME:.*#[0-9]+|TODO.*because|FIXME.*because|\.xxx)"; then
            echo "Found TODO/FIXME comments without proper justification"
            echo "Please either:"
            echo "1. Add issue reference: TODO: implement feature (#123)"
            echo "2. Add explanation: TODO: optimize this because current approach scales poorly"
            echo "3. Fix the issue instead of leaving a TODO"
            exit 1
          fi
