name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff>=0.3
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install cmake ninja
      - name: Install package
        run: |
          for i in 1 2 3; do
            python -m pip install -e .[dev] && break
            echo "Retry $i: pip install failed, retrying in 5s..."
            sleep 5
          done
      - name: Run unit tests with coverage
        run: |
          python -m pytest -m "not e2e" --cov=navirl --cov-report=term-missing --cov-report=xml
      - name: Run E2E regression tests
        run: |
          python -m pytest -m e2e
      - name: Run quick verification suite
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        continue-on-error: true
        run: |
          python -m navirl verify --suite quick
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
