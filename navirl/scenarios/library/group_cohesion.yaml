id: group_cohesion
description: Parent-child style cohesion while traversing open space.
scene:
  backend: grid2d
  map:
    source: builtin
    id: group
seed: 32
horizon:
  steps: 320
  dt: 0.1
humans:
  controller:
    type: orca_plus
    params:
      doorway_token: false
      anisotropic_space: true
      speed_profile: true
      group_cohesion: true
      group_weight: 0.25
      groups:
        - [1, 2]
        - [3, 4]
