  teleport_thresh: 0.95
  deadlock_seconds: 4.5
  deadlock_resample_attempts: 10
  traversability_offset_max: 0.08
  wall_clearance_buffer: 0.0
  near_wall_buffer: 0.0
  max_wall_proximity_fraction: 0.24
  max_agent_stop_seconds: 12.0
  expected_high_interaction: true
render:
  enabled: true
  fps: 12
  video: false
  playback_speed: 1.95
