id: office_cubicle_navigation
description: Navigate through office environment with workers at desks and in corridors.
scene:
  backend: grid2d
  map:
    source: builtin
    id: kitchen  # Reuse kitchen map as office layout with cubicles as workstations
seed: 42
horizon:
  steps: 300
  dt: 0.1
humans:
  controller:
    type: orca_plus
    params:
      doorway_token: false
      anisotropic_space: true
      speed_profile: true
      group_cohesion: false
      hesitation_prob: 0.12  # More hesitant in office environment
      accel_limit: 1.2       # Slower acceleration for professional setting
  count: 5
  starts:
    - [-1.1, -1.0]   # Employee coming from break room
    - [-0.3, 0.8]    # Worker at desk area
    - [0.9, -0.7]    # Person near workstation
    - [1.0, 0.9]     # Manager walking corridor
    - [-1.3, 0.1]    # Visitor entering office
  goals:
    - [1.2, 0.8]     # Going to meeting room
    - [1.1, -0.9]    # Heading to printer area
    - [-1.0, 0.7]    # Going to another desk
    - [-1.1, -0.8]   # Walking to break room
    - [0.8, 0.1]     # Visiting workstation
  radius: 0.17        # Slightly larger personal space in office
  max_speed: 0.6      # Slower walking in office environment
robot:
  controller:
    type: baseline_astar
    params:
      replan_interval: 15
      target_lookahead: 4
      velocity_smoothing: 0.7  # Smoother movement for office robot
      max_speed: 0.5
  start: [-1.4, -0.5]
  goal: [1.3, 0.5]
  radius: 0.2               # Service robot (cleaning/delivery)
  max_speed: 0.5            # Professional, non-disruptive speed
evaluation:
  intrusion_delta: 0.5      # Larger comfort zone in office
  max_speed: 1.0
  max_accel: 3.0            # Gentler acceleration limits
  teleport_thresh: 0.8
  deadlock_seconds: 6.0     # More patience in office setting
  deadlock_resample_attempts: 8
  traversability_offset_max: 0.06
  min_robot_progress: 0.03
  wall_clearance_buffer: 0.0
  near_wall_buffer: 0.0
  max_wall_proximity_fraction: 0.2
  max_agent_stop_seconds: 12.0  # Longer stops acceptable (checking work, etc.)
  expected_high_interaction: false
render:
  enabled: true
  fps: 10
  video: false
  playback_speed: 1.8