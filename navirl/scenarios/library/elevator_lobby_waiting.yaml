id: elevator_lobby_waiting
description: Elevator lobby with people waiting, arriving, and departing in groups.
scene:
  backend: grid2d
  map:
    source: builtin
    id: comfort  # Reuse comfort map as elevator lobby layout
seed: 33
horizon:
  steps: 320
  dt: 0.1
humans:
  controller:
    type: orca_plus
    params:
      doorway_token: true    # Important for elevator door behavior
      anisotropic_space: true
      speed_profile: true
      group_cohesion: true   # People tend to wait in groups
      hesitation_prob: 0.15  # Some hesitation around elevator doors
      accel_limit: 1.8       # Normal acceleration but responsive
  count: 6
  starts:
    - [-1.1, -0.2]    # Person approaching elevator
    - [-0.8, 0.2]     # Already waiting
    - [0.9, -0.3]     # Just arrived at lobby
    - [1.0, 0.1]      # Walking past elevators
    - [-1.2, 0.0]     # Coming from hallway
    - [0.7, 0.3]      # Exiting elevator area
  goals:
    - [0.2, 0.1]      # Joining elevator queue
    - [1.1, -0.2]     # Leaving lobby
    - [0.1, -0.1]     # Getting to elevator
    - [-1.0, 0.2]     # Going to different floor access
    - [0.3, 0.0]      # Waiting for elevator
    - [-1.1, 0.1]     # Exiting building
  radius: 0.16
  max_speed: 0.8      # Normal walking speed but with stops
robot:
  controller:
    type: baseline_astar
    params:
      replan_interval: 12
      target_lookahead: 3
      velocity_smoothing: 0.6
      max_speed: 0.7
  start: [-1.4, -0.1]
  goal: [1.2, 0.1]
  radius: 0.18             # Delivery robot navigating lobby
  max_speed: 0.7
evaluation:
  intrusion_delta: 0.45
  max_speed: 1.3
  max_accel: 4.0
  teleport_thresh: 0.9
  deadlock_seconds: 7.0    # People wait for elevators
  deadlock_resample_attempts: 8
  traversability_offset_max: 0.07
  min_robot_progress: 0.04
  wall_clearance_buffer: 0.0
  near_wall_buffer: 0.0
  max_wall_proximity_fraction: 0.22
  max_agent_stop_seconds: 15.0  # Long waits for elevators
  expected_high_interaction: true
render:
  enabled: true
  fps: 12
  video: false
  playback_speed: 2.0
