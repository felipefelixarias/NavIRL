id: hallway_pass
description: Bidirectional hallway pass with deterministic ORCA baseline.
scene:
  backend: grid2d
  map:
    source: builtin
    id: hallway
seed: 7
horizon:
  steps: 240
  dt: 0.1
humans:
  controller:
    type: orca
    params:
      goal_tolerance: 0.18
  count: 4
  starts:
    - [-1.4, -0.08]
    - [-1.0, 0.1]
    - [1.3, -0.1]
    - [1.1, 0.08]
  goals:
    - [1.35, 0.08]
    - [1.0, -0.1]
    - [-1.3, 0.08]
    - [-1.0, -0.08]
  radius: 0.16
  max_speed: 0.75
robot:
  controller:
    type: baseline_astar
    params:
      replan_interval: 18
      goal_tolerance: 0.16
  start: [-1.55, 0.0]
  goal: [1.55, 0.0]
  radius: 0.18
  max_speed: 0.9
evaluation:
  intrusion_delta: 0.4
  max_speed: 1.2
  max_accel: 4.5
  teleport_thresh: 0.95
  deadlock_seconds: 4.0
  deadlock_resample_attempts: 6
  wall_clearance_buffer: 0.0
  near_wall_buffer: 0.0
  max_wall_proximity_fraction: 0.18
  expected_high_interaction: true
render:
  enabled: true
  fps: 12
  video: false
  playback_speed: 2.0
